<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sullam Tracker</title>
  <style>
    :root{
      --bg:#f3f7ff; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#e6eefc;
      --shadow:0 10px 30px rgba(2,6,23,.08); --radius:18px;
      --green2:#4ade80; --purple2:#a78bfa; --blue2:#60a5fa;
      --gold:#ffd84d; --bronze:#c77c2b; --silver:#cfd3d8;
      --danger:#ffb4b4; --ok:#bff0c8; --warn:#ffe8b0;
      --btn:#111827; --btn2:#334155;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -10%, #d6f7e3 0%, transparent 60%),
        radial-gradient(900px 500px at 10% 10%, #e6dcff 0%, transparent 55%),
        radial-gradient(1000px 500px at 90% 15%, #d4ecff 0%, transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1200px;margin:24px auto;padding:12px}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
    .brand{display:flex;gap:10px;align-items:center;font-weight:1000}
    .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--purple2),var(--blue2));box-shadow:var(--shadow)}
    .pill{
      display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.75);border:1px solid var(--line);
      padding:8px 10px;border-radius:999px;box-shadow:0 6px 18px rgba(2,6,23,.06);backdrop-filter:blur(8px)
    }
    .pill small{color:var(--muted);font-weight:900}
    .btn{border:none;border-radius:12px;padding:10px 12px;background:var(--btn);color:#fff;font-weight:1000;cursor:pointer}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .btn.danger{background:#b91c1c}
    .tabs,.subTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab,.subTab{
      padding:9px 12px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.75);cursor:pointer;font-weight:1000;color:var(--btn2)
    }
    .tab.active,.subTab.active{background:var(--btn);color:#fff;border-color:transparent}
    .grid{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:14px;align-items:start}
    @media(max-width:1050px){.grid{grid-template-columns:1fr}}
    .card{
      background:rgba(255,255,255,.82);border:1px solid var(--line);
      border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(10px)
    }
    .cardHead{
      padding:14px 16px;border-bottom:1px solid var(--line);
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap
    }
    .cardHead h3{margin:0;font-size:16px}
    .cardHead small{color:var(--muted);font-weight:900}
    .cardBody{padding:12px 14px}
    .row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--line);gap:10px}
    .row:last-child{border-bottom:none}
    .meta{color:var(--muted);font-size:12px;font-weight:900}
    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.8);font-size:12px;font-weight:1000;color:var(--btn2)
    }
    .badge.ok{background:var(--ok);border-color:#a7e4b4}
    .badge.warn{background:var(--warn);border-color:#f3d27a}
    .notice{
      padding:10px 12px;border-radius:14px;border:1px solid var(--line);
      background:rgba(255,255,255,.75);color:var(--btn2);font-weight:900
    }
    .twoCol{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:700px){.twoCol{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:var(--muted);font-weight:1000;margin-bottom:6px}
    input,select,textarea{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);
      outline:none;background:rgba(255,255,255,.9);font-weight:900;color:var(--ink)
    }
    textarea{min-height:90px;resize:vertical}
    .formRow{margin-bottom:10px}
    .hr{height:1px;background:var(--line);margin:12px 0}
    .hidden{display:none !important}
    .fab{
      position:fixed;right:18px;bottom:18px;width:56px;height:56px;border-radius:18px;border:none;
      background:linear-gradient(135deg,var(--purple2),var(--blue2));color:#fff;font-weight:1000;font-size:28px;
      box-shadow:0 18px 35px rgba(2,6,23,.22);cursor:pointer;display:none;align-items:center;justify-content:center
    }
    .modalBack{
      position:fixed;inset:0;background:rgba(2,6,23,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:1000;
    }
    .modal{
      width:min(760px,100%);border-radius:20px;background:rgba(255,255,255,.96);
      border:1px solid var(--line);box-shadow:0 30px 80px rgba(2,6,23,.35);overflow:hidden;backdrop-filter:blur(12px)
    }
    .modalHead{
      padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);font-weight:1000
    }
    .xbtn{border:none;background:transparent;font-size:20px;cursor:pointer}

    .leaderHero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.24), transparent 35%),
        radial-gradient(circle at top right, rgba(255,255,255,.18), transparent 30%),
        linear-gradient(135deg, #14532d, #166534 45%, #15803d 100%);
      color:#fff;
      padding:28px 20px;
    }
    .leaderHeroInner{text-align:center}
    .leaderHeroInner h2{margin:6px 0 8px 0;font-size:30px}
    .leaderHeroInner p{margin:0;opacity:.92;font-weight:800}
    .leaderMini{
      display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.14);
      font-size:12px;font-weight:1000;letter-spacing:.4px
    }
    .leaderboardWrap{padding:18px}
    .podiumFancy{display:flex;justify-content:center;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:20px}
    .podiumFancy .podiumCard{
      width:180px;text-align:center;border-radius:18px;padding:14px 12px;box-shadow:0 12px 25px rgba(2,6,23,.12);
      border:1px solid rgba(15,23,42,.08)
    }
    .podiumFancy .podiumCard h4{margin:10px 0 6px 0;font-size:18px}
    .podiumFancy .bigPts{font-size:22px;font-weight:1000}
    .podiumFancy .smallMeta{margin-top:4px;color:#334155;font-size:13px;font-weight:900}
    .podiumFancy .gold{min-height:220px;background:linear-gradient(180deg,#ffe27a,#ffd84d)}
    .podiumFancy .silver{min-height:190px;background:linear-gradient(180deg,#e8ebef,#cfd3d8)}
    .podiumFancy .bronze{min-height:170px;background:linear-gradient(180deg,#d79a63,#c77c2b);color:#fff}
    .podiumFancy .bronze .smallMeta{color:#fff;opacity:.92}
    .medal{font-size:34px;line-height:1}
    .leaderListFancy{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.8)}
    .leaderRow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
    .leaderRow:last-child{border-bottom:none}
    .leaderLeft{display:flex;align-items:center;gap:12px}
    .leaderNum{
      width:38px;height:38px;border-radius:999px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;
      font-weight:1000;color:#0f172a
    }
    .leaderName{font-size:15px;font-weight:1000}
    .leaderSub{font-size:12px;color:var(--muted);font-weight:900;margin-top:2px}
    .leaderPts{text-align:right}
    .leaderPts strong{display:block;font-size:16px}
    .leaderPts span{font-size:12px;color:var(--muted);font-weight:900}

    .sullamShell{background:#131313;color:#fff;border-radius:18px;padding:18px}
    .sullamHeader{text-align:center;margin-bottom:18px}
    .sullamTitle{font-size:34px;font-weight:1000;line-height:1.1}
    .sullamSub{font-size:16px;opacity:.92}
    .sullamTopStats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
    .sStat{background:rgba(255,255,255,.08);padding:10px 16px;border-radius:14px;font-weight:900}
    .stairWrap{display:flex;justify-content:center;overflow:auto;padding:10px 0}
    #sullamStair{display:flex;flex-direction:column;gap:5px;align-items:flex-start}
    .sullamRow{display:flex;gap:4px}
    .sullamCell{
      width:54px;height:46px;display:flex;align-items:center;justify-content:center;
      font-weight:1000;font-size:16px;background:#ece8cf;color:#111827;border:1px solid rgba(255,255,255,.18);
      user-select:none;cursor:pointer;position:relative
    }
    .sullamCell.done{background:#b9ecb0}
    .sullamCell.done::after{
      content:"✕";position:absolute;color:#c1121f;font-size:28px;font-weight:1000
    }
    .sullamCell.current{background:#f3d58b}
    .sullamCell.selected{outline:3px solid #22c55e;outline-offset:-3px}
    .sullamCell.checkpoint{box-shadow:inset 0 0 0 3px #60a5fa}
    .sullamBtns{display:flex;justify-content:center;gap:22px;flex-wrap:wrap;margin-top:24px}
    .roundAction{
      width:96px;height:96px;border:none;border-radius:999px;font-size:34px;font-weight:1000;color:#fff;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 14px 26px rgba(0,0,0,.28)
    }
    .roundAction span{font-size:13px;margin-top:4px;font-weight:800}
    .redBtn{background:#ef4444}
    .greenBtn{background:#22c55e}
    .orangeBtn{background:#f59e0b}
    .teacherOption{padding:12px;border-bottom:1px solid #e5e7eb;cursor:pointer;font-weight:800}
    .teacherOption:hover{background:#f8fafc}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="logo"></div><div>Official Sullam Tracker</div></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        <div class="pill">
          <small>User:</small>
          <strong id="whoName">Logged out</strong>
          <span class="badge" id="whoRole">guest</span>
        </div>
        <button class="btn secondary" id="btnAuth">Sign up / Sign in</button>
        <button class="btn secondary hidden" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="viewHome" class="grid">
      <div class="card">
        <div class="cardHead" style="background:linear-gradient(135deg,var(--purple2),#c4b5fd);color:#1f1147;">
          <h3>My Progress</h3><small>Current approved step</small>
        </div>
        <div class="cardBody" id="homeLeft"></div>
      </div>

      <div class="card">
        <div class="cardHead" style="background:linear-gradient(135deg,var(--green2),#22c55e);color:#06331a;">
          <h3>Pending</h3><small>Waiting for teacher</small>
        </div>
        <div class="cardBody" id="homeMiddle"></div>
      </div>

      <div class="card">
        <div class="cardHead" style="background:linear-gradient(135deg,var(--blue2),#93c5fd);color:#06253e;">
          <h3>Qadeem</h3><small>Review schedule</small>
        </div>
        <div class="cardBody" id="homeRight"></div>
      </div>
    </div>

    <div id="viewLeaderboard" class="card hidden">
      <div class="leaderHero">
        <div class="leaderHeroInner">
          <div class="leaderMini">Official Ranking</div>
          <h2>Quran Leaderboard</h2>
          <p id="leaderMeta">—</p>
        </div>
      </div>
      <div class="leaderboardWrap">
        <div class="podium podiumFancy" id="leaderPodium"></div>
        <div class="leaderListFancy" id="leaderList"></div>
      </div>
    </div>

    <div id="viewMyQuran" class="card hidden">
      <div class="cardHead"><h3>My Quran</h3><small>Jadeed • Qadeem • Sullam</small></div>
      <div class="cardBody">
        <div class="subTabs" id="myQuranTabs"></div>
        <div id="myQuranBody"></div>
      </div>
    </div>

    <div id="viewTeacher" class="card hidden">
      <div class="cardHead"><h3>Teacher Zone</h3><small>Approve + track students</small></div>
      <div class="cardBody" id="teacherBody"></div>
    </div>

    <div id="viewAdmin" class="card hidden">
      <div class="cardHead"><h3>Admin</h3><small>Roles + leaderboard settings</small></div>
      <div class="cardBody" id="adminBody"></div>
    </div>
  </div>

  <button class="fab" id="fab" title="Open My Quran">+</button>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalHead">
        <div id="modalTitle">—</div>
        <button class="xbtn" id="modalClose">✕</button>
      </div>
      <div class="cardBody" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://amudgjmpknarglyefgxk.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtdWRnam1wa25hcmdseWVmZ3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODI1MzEsImV4cCI6MjA4ODE1ODUzMX0.nBHxEAMhVnmxssgSpsOa_ZUO8DuX8w0Oiz8FEu0QAW8";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let me = null;
    let profile = null;
    let settings = null;
    let activeTab = "home";
    let myQuranTab = "jadeed";
    let approvedStep = 0;
    let targetStep = 1;

    const CHECKPOINT_STEPS = new Set([11,22,33,44,50,51,52,53,54,55]);

    const TABS = [
      { key:"home", label:"Home", guard:"any" },
      { key:"leaderboard", label:"Leaderboard", guard:"any" },
      { key:"myquran", label:"My Quran", guard:"any" },
      { key:"teacher", label:"Teacher Zone", guard:"teacher_or_admin" },
      { key:"admin", label:"Admin", guard:"admin" }
    ];

    const MY_QURAN_TABS = [
      { key:"jadeed", label:"New (Jadeed)" },
      { key:"qadeem", label:"Old (Qadeem)" },
      { key:"sullam", label:"Sullam" }
    ];

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    function openModal(title, html){
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = html;
      document.getElementById("modalBack").style.display = "flex";
    }

    function closeModal(){
      document.getElementById("modalBack").style.display = "none";
      document.getElementById("modalBody").innerHTML = "";
    }

    function canSee(guard){
      if(guard === "any") return true;
      const r = profile?.role || "guest";
      if(guard === "admin") return r === "admin";
      if(guard === "teacher_or_admin") return r === "teacher" || r === "admin";
      return false;
    }

    function setWho(){
      const name = profile?.display_name || me?.email || "Logged out";
      const role = profile?.role || (me ? "student" : "guest");

      document.getElementById("whoName").textContent = name;
      const roleEl = document.getElementById("whoRole");
      roleEl.textContent = role;
      roleEl.className = "badge" + (
        role === "admin" ? " ok" :
        role === "teacher" ? " warn" : ""
      );

      document.getElementById("btnAuth").classList.toggle("hidden", !!me);
      document.getElementById("btnLogout").classList.toggle("hidden", !me);
      document.getElementById("fab").style.display = me ? "flex" : "none";
    }

    function renderTabs(){
      const el = document.getElementById("tabs");
      el.innerHTML = "";
      for(const t of TABS){
        if(!canSee(t.guard)) continue;
        const b = document.createElement("button");
        b.className = "tab" + (activeTab === t.key ? " active" : "");
        b.textContent = t.label;
        b.addEventListener("click", () => {
          activeTab = t.key;
          renderAll();
        });
        el.appendChild(b);
      }
    }

    function showView(){
      const map = {
        home:"viewHome",
        leaderboard:"viewLeaderboard",
        myquran:"viewMyQuran",
        teacher:"viewTeacher",
        admin:"viewAdmin"
      };
      Object.values(map).forEach(id => document.getElementById(id).classList.add("hidden"));
      document.getElementById(map[activeTab]).classList.remove("hidden");
    }

    async function loadMe(){
      const { data: { user } } = await sb.auth.getUser();
      me = user || null;

      if(!me){
        profile = null;
        return;
      }

      const { data } = await sb
        .from("profiles")
        .select("id, display_name, role")
        .eq("id", me.id)
        .maybeSingle();

      if(data){
        profile = data;
      } else {
        profile = {
          id: me.id,
          display_name: me.user_metadata?.display_name || me.email || "User",
          role: "student"
        };
      }
    }

    async function loadSettings(){
      const { data } = await sb
        .from("app_settings")
        .select("*")
        .eq("id", true)
        .maybeSingle();

      settings = data || {
        leaderboard_enabled:false,
        leaderboard_start_at:null,
        leaderboard_end_at:null,
        points_qadeem:2000,
        points_jadeed:2000,
        points_sullam:6000
      };
    }

    function leaderboardOpenNow(){
      if(!settings?.leaderboard_enabled) return false;
      const now = new Date();
      const start = settings?.leaderboard_start_at ? new Date(settings.leaderboard_start_at) : null;
      const end = settings?.leaderboard_end_at ? new Date(settings.leaderboard_end_at) : null;
      if(start && now < start) return false;
      if(end && now > end) return false;
      return true;
    }

    async function loadApprovedStep(){
      if(!me){
        approvedStep = 0;
        targetStep = 1;
        return;
      }

      const { data } = await sb
        .from("sullam_progress")
        .select("step_number")
        .eq("user_id", me.id)
        .order("step_number", { ascending:false })
        .limit(1);

      approvedStep = data && data.length ? Number(data[0].step_number || 0) : 0;
      targetStep = Math.min(55, Math.max(1, approvedStep + 1));
    }

    async function bootData(){
      await loadMe();
      await loadSettings();
      await loadApprovedStep();
    }

    async function openAuth(){
      openModal("Sign up / Sign in", `
        <div class="twoCol">
          <div class="formRow">
            <label>Display name</label>
            <input id="authName" placeholder="Your name" />
          </div>
          <div class="formRow">
            <label>Email</label>
            <input id="authEmail" type="email" placeholder="email@example.com" />
          </div>
        </div>
        <div class="twoCol">
          <div class="formRow">
            <label>Password</label>
            <input id="authPass" type="password" placeholder="••••••••" />
          </div>
          <div class="formRow">
            <label>Mode</label>
            <select id="authMode">
              <option value="signup">Sign up</option>
              <option value="signin">Sign in</option>
            </select>
          </div>
        </div>
        <button class="btn" id="authContinueBtn" style="width:100%;">Continue</button>
      `);
      document.getElementById("authContinueBtn").addEventListener("click", doAuth);
    }

    async function doAuth(){
      const name = document.getElementById("authName").value.trim();
      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPass").value;
      const mode = document.getElementById("authMode").value;

      if(!email || !password){
        alert("Email + password required.");
        return;
      }

      if(mode === "signup"){
        if(!name){
          alert("Display name required.");
          return;
        }
        const { error } = await sb.auth.signUp({
          email,
          password,
          options: { data: { display_name: name } }
        });
        if(error){
          alert(error.message);
          return;
        }
        alert("Signed up ✅ Now sign in.");
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error){
        alert(error.message);
        return;
      }

      closeModal();
      await bootData();
      await renderAll();
    }

    async function doLogout(){
      const { error } = await sb.auth.signOut();
      if(error){
        alert(error.message);
        return;
      }
      me = null;
      profile = null;
      activeTab = "home";
      myQuranTab = "jadeed";
      approvedStep = 0;
      targetStep = 1;
      await renderAll();
    }

    async function fetchTeachers(){
      const { data } = await sb
        .from("profiles")
        .select("id, display_name, role")
        .in("role", ["teacher","admin"]);
      return data || [];
    }

    async function fetchStudents(){
      const { data } = await sb
        .from("profiles")
        .select("id, display_name, role")
        .eq("role", "student")
        .order("display_name", { ascending:true });
      return data || [];
    }

    async function renderHome(){
      document.getElementById("homeLeft").innerHTML = me
        ? `<div class="notice">Approved Sullam step: <b>${approvedStep}</b> / 55</div>`
        : `<div class="notice">Sign in to track your Quran.</div>`;

      if(me){
        const { data: pending } = await sb
          .from("memorization_requests")
          .select("*")
          .eq("user_id", me.id)
          .eq("status", "pending")
          .order("created_at", { ascending:false })
          .limit(5);

        document.getElementById("homeMiddle").innerHTML = (pending || []).length
          ? (pending || []).map(x => `
              <div class="row">
                <div>
                  <strong>${escapeHtml(x.type)}</strong>
                  <div class="meta">${escapeHtml(x.surah_name)} • Page ${x.page_number}</div>
                </div>
                <span class="badge warn">pending</span>
              </div>
            `).join("")
          : `<div class="notice">No pending requests.</div>`;

        const { data: qadeem } = await sb
          .from("qadeem_reviews")
          .select("*")
          .eq("user_id", me.id)
          .order("review_day", { ascending:true })
          .limit(5);

        document.getElementById("homeRight").innerHTML = (qadeem || []).length
          ? (qadeem || []).map(x => `

    async function sendSullamRequest(){
      if(!me || !profile) return;

      const teacherId = document.getElementById("studentTeacherId").value;
      const surah = document.getElementById("sSurah").value.trim();
      const page = Number(document.getElementById("sPage").value || 0);
      const ayahFrom = Number(document.getElementById("sAyahFrom").value || 0) || null;
      const ayahTo = Number(document.getElementById("sAyahTo").value || 0) || null;
      const note = document.getElementById("sNote").value.trim();

      if(!teacherId || !surah || !page){
        alert("Enter teacher, surah, and page.");
        return;
      }
      if(targetStep !== approvedStep + 1){
        alert("You cannot progress until the previous step is accepted.");
        return;
      }

      const teachers = await fetchTeachers();
      const teacher = teachers.find(t => t.id === teacherId);
      if(!teacher){
        alert("Teacher not found.");
        return;
      }

      const payload = {
        user_id: me.id,
        type: "sullam",
        surah_name: surah,
        page_number: page,
        ayah_from: ayahFrom,
        ayah_to: ayahTo,
        pages_count: 1,
        step_number: targetStep,
        teacher_id: teacher.id,
        teacher_name: teacher.display_name,
        note,
        status: "pending"
      };

      const { error } = await sb.from("memorization_requests").insert(payload);
      if(error){
        alert(error.message);
        return;
      }

      alert("Sullam request sent ✅");
      await renderAll();
    }

    async function renderMyQuranBody(){
      renderMyQuranTabs();
      const body = document.getElementById("myQuranBody");
      const teachers = await fetchTeachers();

      if(myQuranTab === "jadeed"){
        body.innerHTML = renderJadeedForm(teachers);
        document.getElementById("saveJadeedBtn").addEventListener("click", () => saveMemorization("jadeed"));
        return;
      }

      if(myQuranTab === "qadeem"){
        body.innerHTML = await renderQadeemToday();
        return;
      }

      body.innerHTML = await renderSullam(teachers);

      const stair = document.getElementById("sullamStair");
      buildSullamRows().forEach(rowArr => {
        const row = document.createElement("div");
        row.className = "sullamRow";

        rowArr.forEach(num => {
          const cell = document.createElement("div");
          cell.className = "sullamCell";
          cell.textContent = num;

          if (num <= approvedStep) cell.classList.add("done");
          if (num === approvedStep + 1) cell.classList.add("current");
          if (num === targetStep) cell.classList.add("selected");
          if (CHECKPOINT_STEPS.has(num)) cell.classList.add("checkpoint");

          cell.addEventListener("click", () => {
            if(num <= approvedStep) return;
            targetStep = num;
            renderMyQuranBody();
          });

          row.appendChild(cell);
        });

        stair.appendChild(row);
      });

      document.getElementById("btnStepBack").addEventListener("click", () => {
        targetStep = Math.max(1, targetStep - 1);
        renderMyQuranBody();
      });

      document.getElementById("btnStepSkip").addEventListener("click", () => {
        const v = prompt("Skip to step (future steps only):", String(targetStep));
        if (v === null) return;
        const n = Number(v);
        if (!Number.isFinite(n) || n < approvedStep + 1 || n > 55) {
          alert(`Enter a step from ${approvedStep + 1} to 55.`);
          return;
        }
        targetStep = n;
        renderMyQuranBody();
      });

      document.getElementById("btnStepConfirm").addEventListener("click", sendSullamRequest);
    }

    async function approveReq(id){
      const { data: r, error } = await sb.from("memorization_requests").select("*").eq("id", id).single();
      if(error){
        alert(error.message);
        return;
      }

      const { data: rec, error: e1 } = await sb.from("memorization_records").insert({
        user_id: r.user_id,
        type: r.type,
        surah_name: r.surah_name,
        page_number: r.page_number,
        ayah_from: r.ayah_from,
        ayah_to: r.ayah_to,
        pages_count: r.pages_count,
        step_number: r.step_number,
        teacher_id: r.teacher_id,
        teacher_name: r.teacher_name,
        note: r.note,
        confirmed_by: me.id
      }).select().single();

      if(e1){
        alert(e1.message);
        return;
      }

      if(r.type === "sullam"){
        const { error: e2 } = await sb.from("sullam_progress").insert({
          user_id: r.user_id,
          step_number: r.step_number,
          surah_name: r.surah_name,
          page_number: r.page_number,
          ayah_from: r.ayah_from,
          ayah_to: r.ayah_to,
          approved_record_id: rec.id
        });
        if(e2){
          alert(e2.message);
          return;
        }
      }

      const { error: e3 } = await sb
        .from("memorization_requests")
        .update({
          status:"approved",
          handled_by: me.id,
          handled_at: new Date().toISOString()
        })
        .eq("id", id);

      if(e3){
        alert(e3.message);
        return;
      }

      alert("Approved ✅");
      await bootData();
      await renderAll();
    }

        <div class="notice"><b>Roles</b></div>
        <div class="hr"></div>

        ${(profs || []).map(p => `
          <div class="row">
            <div>
              <strong>${escapeHtml(p.display_name || "No name")}</strong>
              <div class="meta">${escapeHtml(p.id)}</div>
            </div>
            <div style="min-width:170px">
              <select class="roleSelect" data-id="${p.id}">
                ${["student","teacher","admin"].map(r => `<option value="${r}" ${p.role===r?"selected":""}>${r}</option>`).join("")}
              </select>
            </div>
          </div>
        `).join("")}
      `;

      document.getElementById("saveAdminBtn").addEventListener("click", saveAdminSettings);
      [...body.querySelectorAll(".roleSelect")].forEach(sel => {
        sel.addEventListener("change", () => updateRole(sel.dataset.id, sel.value));
      });
    }

    async function saveAdminSettings(){
      const leaderboard_enabled = document.getElementById("lbEnabled").value === "true";
      const startVal = document.getElementById("lbStart").value || null;
      const endVal = document.getElementById("lbEnd").value || null;

      const { error } = await sb
        .from("app_settings")
        .update({
          leaderboard_enabled,
          leaderboard_start_at: startVal ? new Date(startVal).toISOString() : null,
          leaderboard_end_at: endVal ? new Date(endVal).toISOString() : null,
          updated_at: new Date().toISOString()
        })
        .eq("id", true);

      if(error){
        alert(error.message);
        return;
      }

      alert("Settings saved ✅");
      await loadSettings();
      await renderAll();
    }

    async function updateRole(id, role){
      const { error } = await sb.from("profiles").update({ role }).eq("id", id);
      if(error){
        alert(error.message);
        return;
      }
      await bootData();
      await renderAll();
    }

    async function renderAll(){
      setWho();
      renderTabs();
      showView();
      if(activeTab === "home") await renderHome();
      if(activeTab === "leaderboard") await renderLeaderboard();
      if(activeTab === "myquran") await renderMyQuranBody();
      if(activeTab === "teacher") await renderTeacher();
      if(activeTab === "admin") await renderAdmin();
    }

    document.getElementById("btnAuth").addEventListener("click", openAuth);
    document.getElementById("btnLogout").addEventListener("click", doLogout);
    document.getElementById("fab").addEventListener("click", () => {
      activeTab = "myquran";
      renderAll();
    });
    document.getElementById("modalClose").addEventListener("click", closeModal);
    document.getElementById("modalBack").addEventListener("click", (e) => {
      if(e.target.id === "modalBack") closeModal();
    });

    (async () => {
      await bootData();
      await renderAll();

      sb.auth.onAuthStateChange(async () => {
        await bootData();
        activeTab = "home";
        await renderAll();
      });
    })();
  </script>
</body>
</html>
