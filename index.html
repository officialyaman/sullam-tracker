<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sullam Tracker</title>
  <style>
    :root{
      --bg:#f3f7ff; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#e6eefc;
      --shadow:0 10px 30px rgba(2,6,23,.08); --radius:18px;
      --green2:#4ade80; --purple2:#a78bfa; --blue2:#60a5fa;
      --gold:#ffd84d; --bronze:#c77c2b; --silver:#cfd3d8;
      --danger:#ffb4b4; --ok:#bff0c8; --warn:#ffe8b0;
      --btn:#111827; --btn2:#334155;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -10%, #d6f7e3 0%, transparent 60%),
        radial-gradient(900px 500px at 10% 10%, #e6dcff 0%, transparent 55%),
        radial-gradient(1000px 500px at 90% 15%, #d4ecff 0%, transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1200px;margin:24px auto;padding:12px}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
    .brand{display:flex;gap:10px;align-items:center;font-weight:1000}
    .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--purple2),var(--blue2));box-shadow:var(--shadow)}
    .pill{
      display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.75);border:1px solid var(--line);
      padding:8px 10px;border-radius:999px;box-shadow:0 6px 18px rgba(2,6,23,.06);backdrop-filter:blur(8px)
    }
    .pill small{color:var(--muted);font-weight:900}
    .btn{border:none;border-radius:12px;padding:10px 12px;background:var(--btn);color:#fff;font-weight:1000;cursor:pointer}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab{
      padding:9px 12px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.75);cursor:pointer;font-weight:1000;color:var(--btn2)
    }
    .tab.active{background:var(--btn);color:#fff;border-color:transparent}
    .grid{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:14px;align-items:start}
    @media(max-width:1050px){.grid{grid-template-columns:1fr}}
    .card{
      background:rgba(255,255,255,.82);border:1px solid var(--line);
      border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(10px)
    }
    .cardHead{
      padding:14px 16px;border-bottom:1px solid var(--line);
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap
    }
    .cardHead h3{margin:0;font-size:16px}
    .cardHead small{color:var(--muted);font-weight:900}
    .cardBody{padding:12px 14px}
    .leaderHeader{
      background:linear-gradient(135deg,var(--green2),#22c55e);
      color:#06331a;padding:18px 16px;text-align:center;font-weight:1000
    }
    .leaderHeader .sub{font-weight:900;opacity:.9;margin-top:6px}
    .podium{display:flex;gap:10px;justify-content:center;align-items:stretch;padding:14px;flex-wrap:wrap}
    .podiumCard{
      width:170px;border-radius:14px;padding:12px;box-shadow:0 10px 25px rgba(2,6,23,.12);
      text-align:center;border:1px solid rgba(2,6,23,.06)
    }
    .gold{background:var(--gold)} .silver{background:var(--silver)} .bronze{background:var(--bronze);color:#fff}
    .rank{display:inline-block;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.45);font-weight:1000}
    .row{display:flex;justify-content:space-between;align-items:center;padding:12px 12px;border-bottom:1px solid var(--line);gap:10px}
    .row:last-child{border-bottom:none}
    .row strong{font-size:14px}
    .row .meta{color:var(--muted);font-size:12px;font-weight:900}
    .row .right{text-align:right}
    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.8);font-size:12px;font-weight:1000;color:var(--btn2)
    }
    .badge.ok{background:var(--ok);border-color:#a7e4b4}
    .badge.warn{background:var(--warn);border-color:#f3d27a}
    .badge.danger{background:var(--danger);border-color:#ff8f8f}
    .notice{
      padding:10px 12px;border-radius:14px;border:1px solid var(--line);
      background:rgba(255,255,255,.75);color:var(--btn2);font-weight:900
    }
    .twoCol{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:700px){.twoCol{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:var(--muted);font-weight:1000;margin-bottom:6px}
    input,select,textarea{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);
      outline:none;background:rgba(255,255,255,.9);font-weight:900;color:var(--ink)
    }
    textarea{min-height:90px;resize:vertical}
    .formRow{margin-bottom:10px}
    .hr{height:1px;background:var(--line);margin:12px 0}
    .hidden{display:none !important}
    .fab{
      position:fixed;right:18px;bottom:18px;width:56px;height:56px;border-radius:18px;border:none;
      background:linear-gradient(135deg,var(--purple2),var(--blue2));color:#fff;font-weight:1000;font-size:28px;
      box-shadow:0 18px 35px rgba(2,6,23,.22);cursor:pointer;display:none;align-items:center;justify-content:center
    }
    .modalBack{
      position:fixed;inset:0;background:rgba(2,6,23,.45);display:none;align-items:center;justify-content:center;padding:16px
    }
    .modal{
      width:min(760px,100%);border-radius:20px;background:rgba(255,255,255,.92);
      border:1px solid var(--line);box-shadow:0 30px 80px rgba(2,6,23,.35);overflow:hidden;backdrop-filter:blur(12px)
    }
    .modalHead{
      padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);font-weight:1000
    }
    .xbtn{border:none;background:transparent;font-size:20px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="logo"></div><div>Official Sullam Tracker</div></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        <div class="pill">
          <small>User:</small>
          <strong id="whoName">Logged out</strong>
          <span class="badge" id="whoRole">guest</span>
        </div>
        <button class="btn secondary" id="btnAuth">Sign up / Sign in</button>
        <button class="btn secondary hidden" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="viewHome" class="grid">
      <div class="card">
        <div class="cardHead" style="background:linear-gradient(135deg,var(--purple2),#c4b5fd);color:#1f1147;">
          <h3>Qadeem Points</h3><small id="qadeemMeta">—</small>
        </div>
        <div class="cardBody" id="qadeemList"></div>
      </div>

      <div class="card">
        <div class="leaderHeader">
          <div style="font-size:18px;">Total Points Leaderboard</div>
          <div class="sub" id="totalMeta">—</div>
        </div>
        <div class="podium" id="podium"></div>
        <div class="cardBody" id="totalList"></div>
      </div>

      <div class="card">
        <div class="cardHead" style="background:linear-gradient(135deg,var(--blue2),#93c5fd);color:#06253e;">
          <h3>Jadeed Points</h3><small id="jadeedMeta">—</small>
        </div>
        <div class="cardBody" id="jadeedList"></div>
      </div>
    </div>

    <div id="viewSubmit" class="card hidden">
      <div class="cardHead"><h3>Submit</h3><small>Teachers auto-approve</small></div>
      <div class="cardBody" id="submitBody"></div>
    </div>

    <div id="viewTeacher" class="card hidden">
      <div class="cardHead"><h3>Teacher Zone</h3><small>Pending requests</small></div>
      <div class="cardBody" id="teacherBody"></div>
    </div>

    <div id="viewAdmin" class="card hidden">
      <div class="cardHead"><h3>Admin</h3><small>Leaderboard window</small></div>
      <div class="cardBody" id="adminBody"></div>
    </div>
  </div>

  <button class="fab" id="fab" title="New Request">+</button>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalHead">
        <div id="modalTitle">—</div>
        <button class="xbtn" id="modalClose">✕</button>
      </div>
      <div class="cardBody" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://amudgjmpknarglyefgxk.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtdWRnam1wa25hcmdseWVmZ3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODI1MzEsImV4cCI6MjA4ODE1ODUzMX0.nBHxEAMhVnmxssgSpsOa_ZUO8DuX8w0Oiz8FEu0QAW8";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let me = null;
    let profile = null;
    let settings = null;
    let activeTab = "home";

    const TABS = [
      { key:"home", label:"Home", guard:"any" },
      { key:"submit", label:"Submit", guard:"any" },
      { key:"teacher", label:"Teacher Zone", guard:"teacher_or_admin" },
      { key:"admin", label:"Admin", guard:"admin" }
    ];

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    function openModal(title, html){
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = html;
      document.getElementById("modalBack").style.display = "flex";
    }

    function closeModal(){
      document.getElementById("modalBack").style.display = "none";
      document.getElementById("modalBody").innerHTML = "";
    }

    function canSee(guard){
      if(guard === "any") return true;
      const r = profile?.role || "guest";
      if(guard === "admin") return r === "admin";
      if(guard === "teacher_or_admin") return r === "teacher" || r === "admin";
      return false;
    }

    function setWho(){
      const name = profile?.display_name || me?.email || "Logged out";
      const role = profile?.role || (me ? "student" : "guest");

      document.getElementById("whoName").textContent = name;

      const roleEl = document.getElementById("whoRole");
      roleEl.textContent = role;
      roleEl.className = "badge" + (
        role === "admin" ? " ok" :
        role === "teacher" ? " warn" : ""
      );

      document.getElementById("btnAuth").classList.toggle("hidden", !!me);
      document.getElementById("btnLogout").classList.toggle("hidden", !me);
      document.getElementById("fab").style.display = me ? "flex" : "none";
    }

    function renderTabs(){
      const el = document.getElementById("tabs");
      el.innerHTML = "";
      for(const t of TABS){
        if(!canSee(t.guard)) continue;
        const b = document.createElement("button");
        b.className = "tab" + (activeTab === t.key ? " active" : "");
        b.textContent = t.label;
        b.addEventListener("click", () => {
          activeTab = t.key;
          renderAll();
        });
        el.appendChild(b);
      }
    }

    function showView(){
      const ids = ["viewHome","viewSubmit","viewTeacher","viewAdmin"];
      ids.forEach(id => document.getElementById(id).classList.add("hidden"));
      const map = {
        home:"viewHome",
        submit:"viewSubmit",
        teacher:"viewTeacher",
        admin:"viewAdmin"
      };
      document.getElementById(map[activeTab]).classList.remove("hidden");
    }

    async function loadMe(){
      const { data: { user } } = await sb.auth.getUser();
      me = user || null;

      if(!me){
        profile = null;
        return;
      }

      const { data, error } = await sb
        .from("profiles")
        .select("id, display_name, role")
        .eq("id", me.id)
        .single();

      if(error || !data){
        profile = {
          id: me.id,
          display_name: me.user_metadata?.display_name || me.email || "User",
          role: "student"
        };
      } else {
        profile = data;
      }
    }

    async function loadSettings(){
      const { data } = await sb
        .from("app_settings")
        .select("*")
        .eq("id", true)
        .single();
      settings = data || null;
    }

    function leaderboardOpenNow(){
      if(!settings?.leaderboard_enabled) return false;
      const now = new Date();
      const start = settings?.leaderboard_start_at ? new Date(settings.leaderboard_start_at) : null;
      const end = settings?.leaderboard_end_at ? new Date(settings.leaderboard_end_at) : null;
      if(start && now < start) return false;
      if(end && now > end) return false;
      return true;
    }

    async function openAuth(){
      openModal("Sign up / Sign in", `
        <div class="twoCol">
          <div class="formRow">
            <label>Display name</label>
            <input id="authName" placeholder="Your name" />
          </div>
          <div class="formRow">
            <label>Email</label>
            <input id="authEmail" type="email" placeholder="email@example.com" />
          </div>
        </div>
        <div class="twoCol">
          <div class="formRow">
            <label>Password</label>
            <input id="authPass" type="password" placeholder="••••••••" />
          </div>
          <div class="formRow">
            <label>Mode</label>
            <select id="authMode">
              <option value="signup">Sign up</option>
              <option value="signin">Sign in</option>
            </select>
          </div>
        </div>
        <button class="btn" id="authContinueBtn" style="width:100%;">Continue</button>
      `);

      document.getElementById("authContinueBtn").addEventListener("click", doAuth);
    }

    async function doAuth(){
      const name = document.getElementById("authName").value.trim();
      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPass").value;
      const mode = document.getElementById("authMode").value;

      if(!email || !password){
        alert("Email + password required.");
        return;
      }

      if(mode === "signup"){
        if(!name){
          alert("Display name required.");
          return;
        }

        const { error } = await sb.auth.signUp({
          email,
          password,
          options: { data: { display_name: name } }
        });

        if(error){
          alert(error.message);
          return;
        }

        alert("Signed up ✅ Now sign in.");
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error){
        alert(error.message);
        return;
      }

      closeModal();
      await loadMe();
      await loadSettings();
      await renderAll();
    }

    async function doLogout(){
      const { error } = await sb.auth.signOut();
      if(error){
        alert(error.message);
        return;
      }
      me = null;
      profile = null;
      activeTab = "home";
      await renderAll();
    }

    async function fetchLeaderboard(){
      if(!leaderboardOpenNow()) return [];

      const { data: rows } = await sb.from("leaderboard_points").select("*");
      const all = rows || [];
      const ids = all.map(x => x.user_id);

      let nameMap = new Map();
      if(ids.length){
        const { data: profs } = await sb.from("profiles").select("id,display_name").in("id", ids);
        if(profs) nameMap = new Map(profs.map(p => [p.id, p.display_name]));
      }

      return all.map(x => ({
        ...x,
        name: nameMap.get(x.user_id) || "User"
      }));
    }

    function renderPointsList(list, field){
      if(!list.length) return `<div class="meta">No data yet.</div>`;
      const sorted = [...list].sort((a,b)=>Number(b[field]||0)-Number(a[field]||0));
      return sorted.slice(0,10).map((x,i)=>`
        <div class="row">
          <div>
            <strong>#${i+1} ${escapeHtml(x.name)}</strong>
            <div class="meta">${Math.round(Number(x[field]||0))} points</div>
          </div>
          <div class="right"><strong>${Math.round(Number(x[field]||0))}</strong></div>
        </div>
      `).join("");
    }

    async function renderHome(){
      const rows = await fetchLeaderboard();

      if(!leaderboardOpenNow()){
        document.getElementById("totalMeta").textContent = "Hidden right now";
        document.getElementById("podium").innerHTML = "";
        document.getElementById("totalList").innerHTML = `<div class="notice">Leaderboard is off or outside the active date/time window.</div>`;
        document.getElementById("qadeemMeta").textContent = "Hidden";
        document.getElementById("jadeedMeta").textContent = "Hidden";
        document.getElementById("qadeemList").innerHTML = `<div class="meta">Hidden</div>`;
        document.getElementById("jadeedList").innerHTML = `<div class="meta">Hidden</div>`;
        return;
      }

      rows.sort((a,b)=>Number(b.total_points||0)-Number(a.total_points||0));
      document.getElementById("totalMeta").textContent = `${rows.length} users`;

      const podium = document.getElementById("podium");
      podium.innerHTML = "";
      const top3 = rows.slice(0,3);
      const order = [{slot:2, cls:"silver"},{slot:1, cls:"gold"},{slot:3, cls:"bronze"}];

      for(const p of order){
        const item = top3[p.slot-1];
        const el = document.createElement("div");
        el.className = `podiumCard ${p.cls}`;
        el.innerHTML = item ? `
          <div class="rank">#${p.slot}</div>
          <h4 style="margin:6px 0 4px 0;">${escapeHtml(item.name)}</h4>
          <div style="font-weight:1000;font-size:18px;">${Math.round(Number(item.total_points||0))}</div>
          <div class="meta">points</div>
        ` : `
          <div class="rank">#${p.slot}</div>
          <h4>—</h4>
          <div style="font-weight:1000;font-size:18px;">0</div>
          <div class="meta">points</div>
        `;
        podium.appendChild(el);
      }

      document.getElementById("totalList").innerHTML = renderPointsList(rows, "total_points");
      document.getElementById("qadeemList").innerHTML = renderPointsList(rows, "qadeem_points");
      document.getElementById("jadeedList").innerHTML = renderPointsList(rows, "jadeed_points");
      document.getElementById("qadeemMeta").textContent = "Live";
      document.getElementById("jadeedMeta").textContent = "Live";
    }

    async function renderSubmit(){
      const body = document.getElementById("submitBody");
      if(!me){
        body.innerHTML = `<div class="notice">Please log in first.</div>`;
        return;
      }

      body.innerHTML = `
        <div class="twoCol">
          <div class="formRow">
            <label>Type</label>
            <select id="subType">
              <option value="qadeem">Qadeem</option>
              <option value="jadeed">Jadeed</option>
              <option value="sullam">Sullam</option>
            </select>
          </div>
          <div class="formRow">
            <label>Pages</label>
            <input id="subPages" type="number" min="1" value="1" />
          </div>
        </div>

        <div class="twoCol">
          <div class="formRow">
            <label>With teacher?</label>
            <select id="subWithTeacher">
              <option value="false">No</option>
              <option value="true">Yes</option>
            </select>
          </div>
          <div class="formRow">
            <label>Teacher name</label>
            <input id="subTeacherName" placeholder="Teacher name" />
          </div>
        </div>

        <div class="formRow">
          <label>Note</label>
          <textarea id="subNote"></textarea>
        </div>

        <button class="btn" id="submitRecordBtn">Submit</button>
      `;

      document.getElementById("submitRecordBtn").addEventListener("click", submitRecord);
    }

    async function submitRecord(){
      if(!me || !profile) return;

      const type = document.getElementById("subType").value;
      const pages = Number(document.getElementById("subPages").value || 0);
      const with_teacher = document.getElementById("subWithTeacher").value === "true";
      const teacher_name = document.getElementById("subTeacherName").value.trim();
      const note = document.getElementById("subNote").value.trim();

      if(pages <= 0){
        alert("Pages must be more than 0.");
        return;
      }

      const autoApprove = profile.role === "teacher" || profile.role === "admin";

      if(autoApprove){
        const { error } = await sb.from("records").insert({
          user_id: me.id,
          type,
          pages,
          with_teacher,
          teacher_name,
          note,
          confirmed_by: me.id
        });
        if(error){
          alert(error.message);
          return;
        }
        alert("Saved directly as approved ✅");
      } else {
        const { error } = await sb.from("requests").insert({
          user_id: me.id,
          type,
          pages,
          with_teacher,
          teacher_name,
          note,
          status: "pending"
        });
        if(error){
          alert(error.message);
          return;
        }
        alert("Sent to Teacher Zone ✅");
      }

      await renderAll();
    }

    async function renderTeacher(){
      const body = document.getElementById("teacherBody");
      if(!canSee("teacher_or_admin")){
        body.innerHTML = `<div class="notice">Teachers/admin only.</div>`;
        return;
      }

      const { data, error } = await sb
        .from("requests")
        .select("*")
        .eq("status","pending")
        .order("created_at", { ascending:false });

      if(error){
        body.innerHTML = `<div class="notice">${escapeHtml(error.message)}</div>`;
        return;
      }

      const reqs = data || [];
      if(!reqs.length){
        body.innerHTML = `<div class="notice">No pending requests.</div>`;
        return;
      }

      body.innerHTML = reqs.map(r => `
        <div class="row">
          <div>
            <strong>${escapeHtml(r.type)}</strong>
            <div class="meta">${Number(r.pages || 0)} pages • ${r.with_teacher ? "with teacher" : "solo"} • ${escapeHtml(r.teacher_name || "—")}</div>
          </div>
          <div class="right">
            <button class="btn approve-btn" data-id="${r.id}">Approve</button>
          </div>
        </div>
      `).join("");

      [...body.querySelectorAll(".approve-btn")].forEach(btn => {
        btn.addEventListener("click", () => approveReq(btn.dataset.id));
      });
    }

    async function approveReq(id){
      const { data: r, error } = await sb.from("requests").select("*").eq("id", id).single();
      if(error){
        alert(error.message);
        return;
      }

      const { error: e1 } = await sb.from("records").insert({
        user_id: r.user_id,
        type: r.type,
        pages: r.pages,
        with_teacher: r.with_teacher,
        teacher_name: r.teacher_name,
        note: r.note,
        confirmed_by: me.id
      });
      if(e1){
        alert(e1.message);
        return;
      }

      const { error: e2 } = await sb.from("requests").update({
        status: "approved",
        handled_by: me.id,
        handled_at: new Date().toISOString()
      }).eq("id", id);
      if(e2){
        alert(e2.message);
        return;
      }

      alert("Approved ✅");
      await renderAll();
    }

    function toDatetimeLocalValue(v){
      if(!v) return "";
      const d = new Date(v);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    async function renderAdmin(){
      const body = document.getElementById("adminBody");
      if(!canSee("admin")){
        body.innerHTML = `<div class="notice">Admin only.</div>`;
        return;
      }

      body.innerHTML = `
        <div class="notice">Leaderboard only shows if enabled and current time is between the start and end.</div>
        <div class="hr"></div>

        <div class="twoCol">
          <div class="formRow">
            <label>Leaderboard enabled?</label>
            <select id="lbEnabled">
              <option value="false" ${!settings?.leaderboard_enabled ? "selected" : ""}>No</option>
              <option value="true" ${settings?.leaderboard_enabled ? "selected" : ""}>Yes</option>
            </select>
          </div>
          <div class="formRow">
            <label>Start</label>
            <input id="lbStart" type="datetime-local" value="${toDatetimeLocalValue(settings?.leaderboard_start_at)}" />
          </div>
        </div>

        <div class="twoCol">
          <div class="formRow">
            <label>End</label>
            <input id="lbEnd" type="datetime-local" value="${toDatetimeLocalValue(settings?.leaderboard_end_at)}" />
          </div>
          <div class="formRow">
            <label>&nbsp;</label>
            <button class="btn" id="saveAdminBtn" style="width:100%;">Save Settings</button>
          </div>
        </div>
      `;

      document.getElementById("saveAdminBtn").addEventListener("click", saveAdminSettings);
    }

    async function saveAdminSettings(){
      const leaderboard_enabled = document.getElementById("lbEnabled").value === "true";
      const startVal = document.getElementById("lbStart").value || null;
      const endVal = document.getElementById("lbEnd").value || null;

      const { error } = await sb
        .from("app_settings")
        .update({
          leaderboard_enabled,
          leaderboard_start_at: startVal ? new Date(startVal).toISOString() : null,
          leaderboard_end_at: endVal ? new Date(endVal).toISOString() : null,
          updated_at: new Date().toISOString()
        })
        .eq("id", true);

      if(error){
        alert(error.message);
        return;
      }

      alert("Settings saved ✅");
      await loadSettings();
      await renderAll();
    }

    async function renderAll(){
      setWho();
      renderTabs();
      showView();
      await renderHome();
      if(activeTab === "submit") await renderSubmit();
      if(activeTab === "teacher") await renderTeacher();
      if(activeTab === "admin") await renderAdmin();
    }

    document.getElementById("btnAuth").addEventListener("click", openAuth);
    document.getElementById("btnLogout").addEventListener("click", doLogout);
    document.getElementById("fab").addEventListener("click", () => {
      activeTab = "submit";
      renderAll();
    });
    document.getElementById("modalClose").addEventListener("click", closeModal);
    document.getElementById("modalBack").addEventListener("click", (e) => {
      if(e.target.id === "modalBack") closeModal();
    });

    (async () => {
      await loadMe();
      await loadSettings();
      await renderAll();

      sb.auth.onAuthStateChange(async (_event, session) => {
        me = session?.user || null;
        await loadMe();
        await loadSettings();
        activeTab = "home";
        await renderAll();
      });
    })();
  </script>
</body>
</html>
