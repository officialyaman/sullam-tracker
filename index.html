<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sullam Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f5f7fb; }
    .btn { padding: 12px 18px; border: 0; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .btn.secondary { background: white; border: 1px solid #ddd; }
    .hidden { display: none; }
    .modalBack {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center;
    }
    .modal {
      width: min(500px, 92vw); background: white; border-radius: 16px; padding: 20px;
    }
    .formRow { margin-bottom: 12px; }
    input, select {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Sullam Tracker</h1>

  <p>
    User:
    <strong id="whoName">Logged out</strong>
  </p>

  <button class="btn secondary" onclick="openAuthModal()">Sign up / Sign in</button>
  <button class="btn secondary hidden" id="btnLogout" onclick="logout()">Logout</button>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3 id="modalTitle">Auth</h3>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.onerror = (msg, src, line) => {
      alert("JS Error: " + msg + " at line " + line);
    };

    const SUPABASE_URL = "https://amudgjmpknarglyefgxk.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtdWRnam1wa25hcmdseWVmZ3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODI1MzEsImV4cCI6MjA4ODE1ODUzMX0.nBHxEAMhVnmxssgSpsOa_ZUO8DuX8w0Oiz8FEu0QAW8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function openModal(title, html) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = html;
      document.getElementById("modalBack").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modalBack").style.display = "none";
      document.getElementById("modalBody").innerHTML = "";
    }

    function setUser(user) {
      document.getElementById("whoName").textContent = user?.email || "Logged out";
      document.getElementById("btnLogout").classList.toggle("hidden", !user);
    }

    function openAuthModal() {
      openModal("Sign up / Sign in", `
        <div class="formRow">
          <label>Display name</label>
          <input id="authName" placeholder="Your name" />
        </div>
        <div class="formRow">
          <label>Email</label>
          <input id="authEmail" type="email" placeholder="email@example.com" />
        </div>
        <div class="formRow">
          <label>Password</label>
          <input id="authPass" type="password" placeholder="••••••••" />
        </div>
        <div class="formRow">
          <label>Mode</label>
          <select id="authMode">
            <option value="signup">Sign up</option>
            <option value="signin">Sign in</option>
          </select>
        </div>
        <button class="btn secondary" onclick="doAuth()">Continue</button>
        <button class="btn secondary" onclick="closeModal()" style="margin-left:8px;">Cancel</button>
      `);
    }

    async function doAuth() {
      const name = document.getElementById("authName").value.trim();
      const email = document.getElementById("authEmail").value.trim();
      const pass = document.getElementById("authPass").value;
      const mode = document.getElementById("authMode").value;

      if (!email || !pass) {
        alert("Email and password required.");
        return;
      }

      if (mode === "signup" && !name) {
        alert("Display name required.");
        return;
      }

      if (mode === "signup") {
        const { error } = await supabase.auth.signUp({
          email,
          password: pass,
          options: { data: { display_name: name } }
        });
        if (error) {
          alert(error.message);
          return;
        }
        alert("Signed up. Now sign in.");
      } else {
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password: pass
        });
        if (error) {
          alert(error.message);
          return;
        }
      }

      const { data: { user } } = await supabase.auth.getUser();
      setUser(user);
      closeModal();
    }

    async function logout() {
      await supabase.auth.signOut();
      setUser(null);
    }

    window.openAuthModal = openAuthModal;
    window.closeModal = closeModal;
    window.doAuth = doAuth;
    window.logout = logout;

    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      setUser(user);
    })();
  </script>
</body>
</html>
